<!DOCTYPE html>
<!--
Mi primera pagina html dinamica
-->
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="htpp://www.thymeleaf.org">
    
    <head th:replace="~{layout/plantilla :: head}">
        <title>TechShopito</title>
        <meta charset="UTF-8"/>
        
    </head>
    <body>
        
        <section th:fragment="listadoCategorias">
            
            <!--  
            <h3>Listado de Categorias...</h3>
            <h4>El saludo es: [[${saludo}]] </h4> ... pasar informacion desde programacion en el controller hacia la pagina 
            <h4>El monto es: [[${monto}]] </h4>
            -->
            
            <div class="container"> 
                <div class="row">
                    <div class="col-md-9"> <!-- column medium 9 columnass -->
                        <div class="card mt-3">
                            <div class="card-header">
                                <<h4>[[#{categoria.listado}]]</h4>
                            </div>
                            <div class="card-body"> 
                                
            <!-- windows > IDE tools > palette -->
            <table class="table table-striped table-hover">
                <thead class="table-dark"> <!-- titulo de las columnas -->                    <tr>
                        <th>#</th>
                        <th>[[#{categoria.descripcion}]]</th>
                        <th>[[#{categoria.activo}]]</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody> <!-- filas de la tabla -->
                    <!-- <tr> para iniciar una fila -->
                    <tr th:each="c : ${categorias}"> <!-- igual a categoria controller -->
                        <td>[[${c.idCategoria}]]</td>
                        <td>[[${c.descripcion}]]</td>
                        <td>[[${c.activo}]]</td>
                        <td>
                            <a class="btn btn-danger"
                                th:href="@{/categoria/eliminar/}+${c.idCategoria}">
                            <i class="fas fa-trash"></i> [[#{accion.eliminar}]]</a>
                        </td>
                    </tr>

                </tbody>
            </table>
            
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
      </body>
</html>
